<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Beige background -->
  <rect width="1200" height="630" fill="#FAF8F5"/>
  
  <!-- Centered sunglasses icon (scaled up, centered at x=600, y=250) -->
  <g transform="translate(540, 220) scale(3)">
    <!-- Left lens -->
    <path d="M2 6.5 C2 3 4.5 1.5 8 1.5 L11 1.5 C14.5 1.5 17 3 17 6.5 L17 9.5 C17 13 14.5 14.5 11 14.5 L8 14.5 C4.5 14.5 2 13 2 9.5 Z" fill="#1A1A1A" transform="rotate(-2 9.5 8)"/>
    <!-- Right lens -->
    <path d="M23 6.5 C23 3 25.5 1.5 29 1.5 L32 1.5 C35.5 1.5 38 3 38 6.5 L38 9.5 C38 13 35.5 14.5 32 14.5 L29 14.5 C25.5 14.5 23 13 23 9.5 Z" fill="#1A1A1A" transform="rotate(-2 30.5 8)"/>
    <!-- Bridge -->
    <path d="M17 7 Q20 4 23 7" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left temple -->
    <path d="M2 5 L-1 3" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
    <!-- Right temple -->
    <path d="M38 5 L41 3" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- COOK A LOOK wordmark -->
  <text x="600" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="600" letter-spacing="12" fill="#1A1A1A" text-anchor="middle">COOK A LOOK</text>
  
  <!-- Tagline -->
  <text x="600" y="400" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="400" letter-spacing="2" fill="#6B6560" text-anchor="middle" font-style="italic">Discover your personal style.</text>
</svg>